<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FANZONE - Soutenez vos createurs preferes" />
    <title>FANZONE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Animated background orbs — outside React to guarantee rendering -->
    <div id="orbs-bg" style="position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;">
      <div style="position: absolute; top: 50px; left: 50px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(239,68,68,0.9) 0%, rgba(236,72,153,0.7) 40%, transparent 70%); filter: blur(40px); animation: orbPulse 6s ease-in-out infinite;"></div>
      <div style="position: absolute; top: 50px; right: 50px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(147,51,234,0.9) 0%, rgba(79,70,229,0.7) 40%, transparent 70%); filter: blur(40px); animation: orbPulse 8s ease-in-out infinite 1s;"></div>
      <div style="position: absolute; bottom: 50px; left: 50px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(34,211,238,0.9) 0%, rgba(20,184,166,0.7) 40%, transparent 70%); filter: blur(40px); animation: orbPulse 10s ease-in-out infinite 2s;"></div>
      <div style="position: absolute; bottom: 50px; right: 50px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(251,191,36,0.9) 0%, rgba(249,115,22,0.7) 40%, transparent 70%); filter: blur(40px); animation: orbPulse 7s ease-in-out infinite 3s;"></div>
    </div>
    <div id="root"></div>
    <style>
      @keyframes orbPulse {
        0%, 100% { opacity: 0.9; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
